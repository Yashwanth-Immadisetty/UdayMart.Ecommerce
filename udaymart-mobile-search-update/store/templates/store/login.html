{% extends 'store/base.html' %}
{% block title %}Sign In – Uday Mart{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🛒 Uday Mart</div>
    <h2>Sign In</h2>
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
      </div>
      {% if form.errors %}
      <div class="auth-error">Invalid username or password. Please try again.</div>
      {% endif %}
      <button type="submit" class="btn-auth">Sign In</button>
    </form>
    <div class="auth-divider">New to Uday Mart?</div>
    <a href="{% url 'register' %}" class="btn-auth-outline">Create Account</a>
  </div>
</div>
{% endblock %}
